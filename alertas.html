<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoCílios · Alertas</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/dados.js"></script>
  <script src="js/app.js"></script>
  <style>
    .alerts-grid { display: flex; flex-direction: column; gap: 10px; }
    .alert-full-item {
      display: flex; gap: 16px; padding: 18px 20px;
      background: var(--bg-700); border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      align-items: flex-start;
      transition: all var(--transition);
    }
    .alert-full-item:hover { border-color: var(--border-strong); background: var(--surface-1); }
    .alert-full-item.nao-lido.critico { border-left: 3px solid var(--cor-critico); }
    .alert-full-item.nao-lido.atencao { border-left: 3px solid var(--cor-atencao); }
    .alert-full-item.nao-lido.info { border-left: 3px solid var(--cor-info); }
    .alert-big-icon { font-size: 28px; flex-shrink: 0; margin-top: 2px; }
    .alert-content { flex: 1; min-width: 0; }
    .alert-full-title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
    .alert-full-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 8px; }
    .alert-full-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: var(--text-muted); align-items: center; }
    .alert-actions { display: flex; gap: 8px; align-items: flex-start; flex-shrink: 0; flex-direction: column; }

    .stats-strip {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px;
    }

    .stat-strip-card {
      background: var(--bg-700); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 18px;
      display: flex; align-items: center; gap: 12px;
    }

    .stat-strip-icon { font-size: 24px; }
    .stat-strip-val { font-size: 22px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
    .stat-strip-label { font-size: 11px; color: var(--text-muted); }
  </style>
</head>
<body class="app-layout">
  <div id="nav-root"></div>

  <div class="main-content">
    <div class="page-inner fade-in">

      <div class="page-header">
        <div>
          <h1 class="page-title">🔔 Central de Alertas</h1>
          <p class="page-subtitle">Notificações e ocorrências detectadas pelos sensores da rede</p>
        </div>
        <div class="header-actions">
          <button class="btn btn-secondary" id="btnMarcarLido" onclick="marcarTodosLidos()">✓ Marcar todos como lidos</button>
        </div>
      </div>

      <!-- Strip de stats -->
      <div class="stats-strip" id="statsStrip"></div>

      <!-- Filtros -->
      <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center">
        <select id="filtroTipo" style="max-width:160px">
          <option value="">Todos os tipos</option>
          <option value="critico">Crítico</option>
          <option value="atencao">Atenção</option>
          <option value="info">Informação</option>
        </select>
        <select id="filtroLido" style="max-width:160px">
          <option value="">Todos</option>
          <option value="false">Não lidos</option>
          <option value="true">Lidos</option>
        </select>
        <select id="filtroDevice" style="max-width:160px">
          <option value="">Todos os dispositivos</option>
        </select>
        <div style="flex:1"></div>
        <span class="chip" id="alertCount">8 alertas</span>
      </div>

      <!-- Lista de alertas -->
      <div class="alerts-grid" id="alertasLista"></div>

    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.verificar()) return;
      renderNav('alertas');

      let alertas = [...window.EcoData.ALERTAS];
    let filtroTipo = '', filtroLido = '', filtroDevice = '';

    // Preencher select de dispositivos
    const devSel = document.getElementById('filtroDevice');
    window.EcoData.DISPOSITIVOS.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = d.id + ' · ' + d.bairro;
      devSel.appendChild(opt);
    });

    function renderStats() {
      const criticos = alertas.filter(a => a.tipo === 'critico').length;
      const atencao = alertas.filter(a => a.tipo === 'atencao').length;
      const naoLidos = alertas.filter(a => !a.lido).length;
      const info = alertas.filter(a => a.tipo === 'info').length;
      document.getElementById('statsStrip').innerHTML = `
        <div class="stat-strip-card">
          <span class="stat-strip-icon">🚨</span>
          <div>
            <div class="stat-strip-val" style="color:var(--cor-critico)">${criticos}</div>
            <div class="stat-strip-label">Críticos</div>
          </div>
        </div>
        <div class="stat-strip-card">
          <span class="stat-strip-icon">⚠️</span>
          <div>
            <div class="stat-strip-val" style="color:var(--cor-atencao)">${atencao}</div>
            <div class="stat-strip-label">Atenção</div>
          </div>
        </div>
        <div class="stat-strip-card">
          <span class="stat-strip-icon">🔵</span>
          <div>
            <div class="stat-strip-val" style="color:var(--cor-info)">${naoLidos}</div>
            <div class="stat-strip-label">Não lidos</div>
          </div>
        </div>
        <div class="stat-strip-card">
          <span class="stat-strip-icon">ℹ️</span>
          <div>
            <div class="stat-strip-val" style="color:var(--text-secondary)">${info}</div>
            <div class="stat-strip-label">Informativos</div>
          </div>
        </div>
      `;
    }

    function filteredAlertas() {
      return alertas.filter(a =>
        (!filtroTipo || a.tipo === filtroTipo) &&
        (!filtroLido || String(!a.lido) === filtroLido || (filtroLido === 'true' && a.lido) || (filtroLido === 'false' && !a.lido)) &&
        (!filtroDevice || a.dispositivo === filtroDevice)
      );
    }

    function renderAlertas() {
      const lista = filteredAlertas();
      document.getElementById('alertCount').textContent = `${lista.length} alertas`;
      const el = document.getElementById('alertasLista');
      el.innerHTML = lista.map(a => `
        <div class="alert-full-item ${!a.lido ? 'nao-lido' : ''} ${a.tipo}" id="alert-${a.id}">
          <span class="alert-big-icon">${a.icone}</span>
          <div class="alert-content">
            <div class="alert-full-title">
              ${a.titulo}
              ${!a.lido ? '<span style="font-size:10px;background:var(--cor-critico);color:#fff;padding:2px 7px;border-radius:10px;margin-left:8px;font-weight:600">NOVO</span>' : ''}
            </div>
            <div class="alert-full-desc">${a.descricao}</div>
            <div class="alert-full-meta">
              ${Utils.statusBadge(a.tipo === 'info' ? 'info' : a.tipo)}
              <span class="chip">${a.dispositivo}</span>
              <span>🕐 ${Utils.ago(a.hora)}</span>
            </div>
          </div>
          <div class="alert-actions">
            ${!a.lido ? `<button class="btn btn-secondary" style="font-size:11px;padding:5px 10px" onclick="marcarLido(${a.id})">✓ Marcar lido</button>` : '<span style="font-size:11px;color:var(--text-muted)">✓ Lido</span>'}
            <a href="dispositivos.html" class="btn btn-secondary" style="font-size:11px;padding:5px 10px">Ver device →</a>
          </div>
        </div>
      `).join('') || '<p style="text-align:center;padding:40px;color:var(--text-muted)">Nenhum alerta encontrado com esses filtros.</p>';
    }

    function marcarLido(id) {
      const a = alertas.find(x => x.id === id);
      if (a) { a.lido = true; renderStats(); renderAlertas(); renderNav('alertas'); }
    }

    function marcarTodosLidos() {
      alertas.forEach(a => a.lido = true);
      // Sincronizar com dados globais
      window.EcoData.ALERTAS.forEach(a => a.lido = true);
      renderStats(); renderAlertas(); renderNav('alertas');
    }

    document.getElementById('filtroTipo').addEventListener('change', e => { filtroTipo = e.target.value; renderAlertas(); });
    document.getElementById('filtroDevice').addEventListener('change', e => { filtroDevice = e.target.value; renderAlertas(); });
    document.getElementById('filtroLido').addEventListener('change', e => {
      filtroLido = e.target.value;
      renderAlertas();
    });

      renderStats();
      renderAlertas();

      window.marcarLido = marcarLido;
      window.marcarTodosLidos = marcarTodosLidos;
    }); // DOMContentLoaded
  </script>
</body>
</html>
