<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoCílios · Dispositivos</title>
  <meta name="description" content="Lista completa dos dispositivos EcoCílios com métricas de sensores e status." />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/dados.js"></script>
  <script src="js/app.js"></script>
  <style>
    .filters-bar {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center;
    }
    .filters-bar > * { flex-shrink: 0; }
    .filters-bar input { max-width: 240px; }
    .filters-bar select { max-width: 180px; }
    .filters-bar .spacer { flex: 1; }

    .device-table-wrapper { overflow-x: auto; }

    .nivel-cell { display: flex; align-items: center; gap: 10px; }
    .nivel-mini-bar { width: 60px; height: 5px; background: var(--bg-500); border-radius: 3px; flex-shrink: 0; }
    .nivel-mini-fill { height: 100%; border-radius: 3px; }

    .ph-indicator {
      display: inline-flex; align-items: center; gap: 5px;
      font-weight: 600; font-size: 13px;
    }

    .grid-devices {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .device-full-card {
      background: var(--bg-700);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      transition: all var(--transition);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .device-full-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .device-full-card.ok::before { background: var(--cor-ok); }
    .device-full-card.atencao::before { background: var(--cor-atencao); }
    .device-full-card.critico::before { background: var(--cor-critico); }
    .device-full-card.manutencao::before { background: var(--cor-manutencao); }

    .device-full-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-card);
      border-color: var(--border-strong);
    }

    .dfc-header {
      display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px;
    }

    .dfc-id {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px; font-weight: 700;
      color: var(--eco-400);
    }

    .dfc-name {
      font-size: 14px; font-weight: 700;
      color: var(--text-primary);
      margin-top: 2px;
    }

    .dfc-bairro {
      font-size: 12px; color: var(--text-muted);
      margin-top: 2px;
      display: flex; align-items: center; gap: 4px;
    }

    .dfc-metrics {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-top: 14px;
    }

    .dfc-metric {
      background: var(--surface-1);
      border-radius: var(--radius-sm);
      padding: 10px;
    }

    .dfc-metric-label {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .dfc-metric-value {
      font-size: 18px; font-weight: 700;
      color: var(--text-primary);
    }

    .dfc-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
    }

    .view-tabs {
      display: flex; gap: 2px;
      background: var(--bg-600);
      border-radius: var(--radius-md);
      padding: 3px;
    }

    .view-tab {
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px; cursor: pointer;
      color: var(--text-muted);
      transition: all var(--transition);
      border: none; background: none;
    }

    .view-tab.active {
      background: var(--bg-700);
      color: var(--text-primary);
      font-weight: 600;
    }

    #viewTable { display: none; }
    #viewGrid { display: grid; }
  </style>
</head>
<body class="app-layout">
  <div id="nav-root"></div>

  <div class="main-content">
    <div class="page-inner fade-in">

      <div class="page-header">
        <div>
          <h1 class="page-title">📡 Dispositivos</h1>
          <p class="page-subtitle">Todos os EcoCílios instalados na rede de monitoramento</p>
        </div>
        <div class="header-actions">
          <div class="view-tabs">
            <button class="view-tab active" id="tabGrid" onclick="setView('grid')">⊞ Grid</button>
            <button class="view-tab" id="tabTable" onclick="setView('table')">≡ Tabela</button>
          </div>
        </div>
      </div>

      <!-- Filtros -->
      <div class="filters-bar">
        <input type="search" id="busca" placeholder="🔍 Buscar por nome, ID ou bairro..." />
        <select id="filtroStatus">
          <option value="">Todos os status</option>
          <option value="ok">Operacional</option>
          <option value="atencao">Atenção</option>
          <option value="critico">Crítico</option>
          <option value="manutencao">Manutenção</option>
        </select>
        <select id="filtroBairro">
          <option value="">Todos os bairros</option>
        </select>
        <div class="spacer"></div>
        <span class="chip" id="countLabel">8 dispositivos</span>
      </div>

      <!-- Grid view -->
      <div class="grid-devices stagger" id="viewGrid"></div>

      <!-- Table view -->
      <div class="card" id="viewTable">
        <div class="device-table-wrapper">
          <table id="devicesTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome / Bairro</th>
                <th>Status</th>
                <th>Nível Lixo</th>
                <th>pH</th>
                <th>Turbidez</th>
                <th>Integridade</th>
                <th>Alertas</th>
                <th>Última Atualização</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="devicesTableBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- Modal detalhe -->
  <div id="deviceModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;">
    <div style="background:var(--bg-700);border:1px solid var(--border);border-radius:var(--radius-xl);padding:32px;max-width:520px;width:92%;max-height:90vh;overflow-y:auto;position:relative;" id="modalContent"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.verificar()) return;
      renderNav('dispositivos');

      const { DISPOSITIVOS, BAIRROS } = window.EcoData;
    let viewMode = 'grid';
    let filtroStatus = '';
    let filtroBusca = '';
    let filtroBairro = '';

    // Bairros no select
    const bairroSel = document.getElementById('filtroBairro');
    BAIRROS.forEach(b => {
      const opt = document.createElement('option');
      opt.value = b; opt.textContent = b;
      bairroSel.appendChild(opt);
    });

    function filteredDevices() {
      return DISPOSITIVOS.filter(d =>
        (!filtroStatus || d.status === filtroStatus) &&
        (!filtroBairro || d.bairro === filtroBairro) &&
        (!filtroBusca || (d.nome + d.id + d.bairro).toLowerCase().includes(filtroBusca.toLowerCase()))
      );
    }

    function renderGrid() {
      const list = filteredDevices();
      document.getElementById('countLabel').textContent = `${list.length} dispositivos`;
      const el = document.getElementById('viewGrid');
      el.innerHTML = list.map(d => `
        <div class="device-full-card ${d.status}" onclick="abrirModal('${d.id}')">
          <div class="dfc-header">
            <div>
              <div class="dfc-id">${d.id}</div>
              <div class="dfc-name">${d.nome.replace('EcoCílio ', '')}</div>
              <div class="dfc-bairro">📍 ${d.bairro}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
              ${Utils.statusBadge(d.status)}
              ${d.alertas > 0 ? `<span class="nav-badge">${d.alertas} alerts</span>` : ''}
            </div>
          </div>

          <div class="progress-bar">
            <div class="progress-fill" style="width:${d.nivelLixo}%;background:${Utils.nivelCor(d.nivelLixo)}"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:5px;margin-bottom:14px">
            <span>Nível de Lixo</span>
            <span style="font-weight:700;color:${Utils.nivelCor(d.nivelLixo)}">${Math.round(d.nivelLixo)}%</span>
          </div>

          <div class="dfc-metrics">
            <div class="dfc-metric">
              <div class="dfc-metric-label">🧪 pH</div>
              <div class="dfc-metric-value" style="color:${d.ph < 6.5 || d.ph > 7.5 ? 'var(--cor-atencao)' : 'var(--cor-ok)'}">${d.ph.toFixed(1)}</div>
            </div>
            <div class="dfc-metric">
              <div class="dfc-metric-label">🌊 Turbidez</div>
              <div class="dfc-metric-value" style="color:${Utils.nivelCor(d.turbidez)}">${d.turbidez} <small style="font-size:11px;font-weight:400">NTU</small></div>
            </div>
            <div class="dfc-metric">
              <div class="dfc-metric-label">🌡️ Temperatura</div>
              <div class="dfc-metric-value">${d.temperatura}°C</div>
            </div>
            <div class="dfc-metric">
              <div class="dfc-metric-label">🔧 Integridade</div>
              <div class="dfc-metric-value" style="color:${d.integridade < 70 ? 'var(--cor-critico)' : d.integridade < 85 ? 'var(--cor-atencao)' : 'var(--cor-ok)'}">${d.integridade}%</div>
            </div>
          </div>

          <div class="dfc-footer">
            <span>🕐 ${d.ultimaAtualizacao}</span>
            <span>📦 ${d.coletasTotal} coletas</span>
          </div>
        </div>
      `).join('') || '<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:40px">Nenhum dispositivo encontrado.</p>';
    }

    function renderTable() {
      const list = filteredDevices();
      document.getElementById('countLabel').textContent = `${list.length} dispositivos`;
      const tbody = document.getElementById('devicesTableBody');
      tbody.innerHTML = list.map(d => `
        <tr onclick="abrirModal('${d.id}')" style="cursor:pointer">
          <td><strong style="color:var(--eco-400);font-family:'Space Grotesk',sans-serif">${d.id}</strong></td>
          <td>
            <div style="font-weight:600;color:var(--text-primary)">${d.nome.replace('EcoCílio ', '')}</div>
            <div style="font-size:11px;color:var(--text-muted)">${d.bairro}</div>
          </td>
          <td>${Utils.statusBadge(d.status)}</td>
          <td>
            <div class="nivel-cell">
              <div class="nivel-mini-bar">
                <div class="nivel-mini-fill" style="width:${d.nivelLixo}%;background:${Utils.nivelCor(d.nivelLixo)}"></div>
              </div>
              <span style="font-weight:600;color:${Utils.nivelCor(d.nivelLixo)}">${Math.round(d.nivelLixo)}%</span>
            </div>
          </td>
          <td class="ph-indicator" style="color:${d.ph < 6.5 || d.ph > 7.5 ? 'var(--cor-atencao)' : 'var(--cor-ok)'}">
            ${d.ph < 6.5 || d.ph > 7.5 ? '⚠️' : '✅'} ${d.ph.toFixed(1)}
          </td>
          <td style="color:${d.turbidez > 100 ? 'var(--cor-critico)' : d.turbidez > 40 ? 'var(--cor-atencao)' : 'var(--cor-ok)'};font-weight:600">
            ${d.turbidez} NTU
          </td>
          <td>
            <div style="color:${d.integridade < 70 ? 'var(--cor-critico)' : d.integridade < 85 ? 'var(--cor-atencao)' : 'var(--cor-ok)'};font-weight:600">
              ${d.integridade}%
            </div>
          </td>
          <td>${d.alertas > 0 ? `<span class="nav-badge">${d.alertas}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
          <td style="font-size:12px;color:var(--text-muted)">${d.ultimaAtualizacao}</td>
          <td>
            <button class="btn btn-secondary" style="padding:5px 12px;font-size:11px" onclick="event.stopPropagation();abrirModal('${d.id}')">Detalhar</button>
          </td>
        </tr>
      `).join('');
    }

    function setView(mode) {
      viewMode = mode;
      document.getElementById('viewGrid').style.display = mode === 'grid' ? 'grid' : 'none';
      document.getElementById('viewTable').style.display = mode === 'table' ? 'block' : 'none';
      document.getElementById('tabGrid').className = 'view-tab' + (mode === 'grid' ? ' active' : '');
      document.getElementById('tabTable').className = 'view-tab' + (mode === 'table' ? ' active' : '');
      if (mode === 'grid') renderGrid(); else renderTable();
    }

    document.getElementById('busca').addEventListener('input', e => { filtroBusca = e.target.value; renderBoth(); });
    document.getElementById('filtroStatus').addEventListener('change', e => { filtroStatus = e.target.value; renderBoth(); });
    document.getElementById('filtroBairro').addEventListener('change', e => { filtroBairro = e.target.value; renderBoth(); });

    function renderBoth() {
      renderGrid(); renderTable();
    }

    // Modal
    function abrirModal(id) {
      const d = DISPOSITIVOS.find(x => x.id === id);
      if (!d) return;
      const integrCor = d.integridade > 85 ? 'var(--cor-ok)' : d.integridade > 65 ? 'var(--cor-atencao)' : 'var(--cor-critico)';
      document.getElementById('modalContent').innerHTML = `
        <button onclick="fecharModal()" style="position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer">✕</button>
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
          <div style="width:48px;height:48px;background:var(--grad-eco);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">🌿</div>
          <div>
            <div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--text-primary)">${d.id} · ${d.nome.replace('EcoCílio ','')}</div>
            <div style="font-size:13px;color:var(--text-muted)">📍 ${d.bairro}</div>
          </div>
          ${Utils.statusBadge(d.status)}
        </div>
        <div class="divider"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
          <div class="card" style="padding:14px">
            <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px">🗑️ Nível Lixo</div>
            <div style="font-size:26px;font-weight:700;color:${Utils.nivelCor(d.nivelLixo)}">${Math.round(d.nivelLixo)}%</div>
            <div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:${d.nivelLixo}%;background:${Utils.nivelCor(d.nivelLixo)}"></div></div>
          </div>
          <div class="card" style="padding:14px">
            <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px">🔧 Integridade</div>
            <div style="font-size:26px;font-weight:700;color:${integrCor}">${d.integridade}%</div>
            <div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:${d.integridade}%;background:${integrCor}"></div></div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
          <div class="card" style="padding:10px;text-align:center"><div>🧪</div><div style="font-size:17px;font-weight:700;color:var(--cor-info)">${d.ph.toFixed(1)}</div><div style="font-size:10px;color:var(--text-muted)">pH</div></div>
          <div class="card" style="padding:10px;text-align:center"><div>🌊</div><div style="font-size:17px;font-weight:700;color:var(--cor-atencao)">${d.turbidez}</div><div style="font-size:10px;color:var(--text-muted)">NTU</div></div>
          <div class="card" style="padding:10px;text-align:center"><div>🌡️</div><div style="font-size:17px;font-weight:700">${d.temperatura}°C</div><div style="font-size:10px;color:var(--text-muted)">Temp.</div></div>
          <div class="card" style="padding:10px;text-align:center"><div>🔔</div><div style="font-size:17px;font-weight:700;color:${d.alertas > 0 ? 'var(--cor-critico)' : 'var(--cor-ok)'}">${d.alertas}</div><div style="font-size:10px;color:var(--text-muted)">Alertas</div></div>
        </div>
        <div class="mini-stat"><span class="mini-stat-label">📅 Instalação</span><span class="mini-stat-value">${d.instalacao}</span></div>
        <div class="mini-stat"><span class="mini-stat-label">🔧 Última Manutenção</span><span class="mini-stat-value">${d.ultimaManutencao}</span></div>
        <div class="mini-stat"><span class="mini-stat-label">📡 Última Atualização</span><span class="mini-stat-value">${d.ultimaAtualizacao}</span></div>
        <div class="mini-stat"><span class="mini-stat-label">📦 Total de Coletas</span><span class="mini-stat-value">${d.coletasTotal}</span></div>
        <div style="display:flex;gap:10px;margin-top:16px">
          <a href="mapa.html" class="btn btn-secondary" style="flex:1;justify-content:center">🗺️ Ver no mapa</a>
          <button class="btn btn-primary" style="flex:1" onclick="fecharModal()">✓ Fechar</button>
        </div>
      `;
      document.getElementById('deviceModal').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('deviceModal').style.display = 'none'; }
    document.getElementById('deviceModal').addEventListener('click', e => {
      if (e.target === document.getElementById('deviceModal')) fecharModal();
    });
    window.abrirModal = abrirModal;
    window.fecharModal = fecharModal;

    renderGrid();

    // Atualização em tempo real
    setInterval(() => {
      simularAtualizacao();
      if (viewMode === 'grid') renderGrid(); else renderTable();
    }, 15000);
    }); // DOMContentLoaded
  </script>
</body>
</html>
